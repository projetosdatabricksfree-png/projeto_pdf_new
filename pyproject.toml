[tool.ruff]
# Enable the following check categories:
# E (Error), F (Pyflakes), W (Warning), I (Isort)
select = ["E", "F", "W", "I"]
ignore = []

# Core settings
line-length = 100
target-version = "py310"
fix = true

[tool.ruff.per-file-ignores]
# Ignore unused-import in all __init__.py files
"__init__.py" = ["F401"]

# Intentional lazy imports/module-level issues in specific files
"agentes/operarios/shared_tools/gwg/run_full_suite.py" = ["E402"]
"projeto_validador/agentes/operarios/shared_tools/gwg/run_full_suite.py" = ["E402"]
"projeto_validador/workers/tasks.py" = ["E402"]
"projeto_validador/app/api/routes_jobs.py" = ["E402"]

[tool.ruff.isort]
known-first-party = ["app", "agentes", "workers"]
combine-as-imports = true
