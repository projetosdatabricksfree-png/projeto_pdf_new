name: Quality Guard (Ruff)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Ruff
        run: pip install ruff
        
      - name: Run Ruff Check (Hard Gate)
        run: ruff check . --output-format github
        
      - name: Run Ruff Format Check
        run: ruff format . --check
