services:
  api:
    restart: always
    build: .
    ports:
      # Host 8001 evita conflito quando já existe algo em 8000
      - "8001:8000"
    mem_limit: 1g
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=sqlite+aiosqlite:///./data/validador.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - VOLUME_PATH=/volumes/uploads
      - APP_ENV=production
    volumes:
      - .:/app
      - uploads:/volumes/uploads
      - db_data:/app/data
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    restart: always
    build:
      context: .
      dockerfile: Dockerfile.worker
    mem_limit: 2g
    memswap_limit: 2g
    deploy:
      replicas: 8
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=sqlite+aiosqlite:///./data/validador.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - VOLUME_PATH=/volumes/uploads
      - APP_ENV=production
      - GWG_CHECKER_TIMEOUT_S=120
      - VIPS_CONCURRENCY=2
    volumes:
      - .:/app
      - uploads:/volumes/uploads
      - db_data:/app/data
    depends_on:
      - redis
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=2 -Q celery,queue:jobs,queue:especialista,queue:routing_decisions,queue:operario_papelaria_plana,queue:operario_editoriais,queue:operario_dobraduras,queue:operario_cortes_especiais,queue:operario_projetos_cad,queue:validador,queue:audit,queue:remediador,queue:validador_final

  redis:
    restart: always
    image: redis:7-alpine
    mem_limit: 256m
    ports:
      - "63799:6379"
    volumes:
      - redis_data:/data

  frontend:
    restart: always
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8001/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  uploads:
  redis_data:
  db_data:
